name: Report an extension
description: Report a malicious, abusive, or broken extension in the marketplace.
title: "[report] <extension-name>"
labels: ["report", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        For a **security vulnerability** in the tooling or app itself, do not file a public issue —
        follow [SECURITY.md](../blob/main/SECURITY.md) instead.
  - type: input
    id: extension
    attributes:
      label: Extension name
      placeholder: some-extension
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Type of problem
      options:
        - Malicious behavior (exfiltration, unexpected shell/network use)
        - Abusive or policy-violating content
        - Broken / fails to load
        - Misleading description or permissions
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: What you observed, and how to reproduce it if applicable.
    validations:
      required: true
